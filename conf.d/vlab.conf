# Docker 내부 DNS resolver - 기동 시 upstream hostname 조회 실패 방지
resolver 127.0.0.11 valid=30s;

# ── HTTP → HTTPS 리다이렉트 + ACME Challenge ─────────────────────────────────
server {
    listen 80;
    server_name ethany.org www.ethany.org;

    # Let's Encrypt 도메인 인증 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지 모든 요청은 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 메인 서버 ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name ethany.org www.ethany.org;

    # ── SSL 인증서 (certbot) ──────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/ethany.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ethany.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    # ── Backend API 프록시 ────────────────────────────────────────────────────
    location /api/ {
        set $backend http://vlab-backend:4000;
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Backend 헬스체크 ──────────────────────────────────────────────────────
    location /health {
        set $backend http://vlab-backend:4000;
        proxy_pass       $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Grafana Live WebSocket (/grafana/api/live/) ────────────────────────────
    location /grafana/api/live/ {
        rewrite ^/grafana/(.*) /$1 break;
        set $grafana http://grafana:3000;
        proxy_pass         $grafana;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $http_host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Grafana 대시보드 프록시 (/grafana/) ────────────────────────────────────
    # rewrite로 /grafana/ prefix 제거 후 전달 → redirect loop 방지
    location /grafana/ {
        rewrite ^/grafana/(.*) /$1 break;
        set $grafana http://grafana:3000;
        proxy_pass         $grafana;
        proxy_redirect     off;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $http_host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend SPA 프록시 ───────────────────────────────────────────────────
    location / {
        set $frontend http://vlab-frontend:80;
        proxy_pass         $frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
