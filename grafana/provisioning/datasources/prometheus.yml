apiVersion: 1

# 기존에 UID가 다르게 생성된 Prometheus 데이터소스를 삭제 후 재생성
deleteDatasources:
  - name: Prometheus
    orgId: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    orgId: 1
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    version: 1
